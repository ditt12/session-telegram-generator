<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Session Berhasil</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    margin:0;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#00cc8855,transparent 40%),
    #080808;

    color:white;

}



.card{

    width:380px;

    padding:30px;

    text-align:center;

    border-radius:20px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 20px 50px rgba(0,0,0,.5);

}



.icon{

    width:80px;

    height:80px;

    margin:auto;

    display:flex;

    justify-content:center;

    align-items:center;

    border-radius:50%;

    background:#00b894;

    font-size:40px;

}



h1{

    margin-top:20px;

}



.desc{

    color:#aaa;

    font-size:14px;

    margin-bottom:25px;

}



.session-box{

    background:#111;

    padding:15px;

    border-radius:12px;

    margin-bottom:20px;

    word-break:break-all;

    color:#ddd;

    border:1px solid #333;

}



button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:

    linear-gradient(
    135deg,
    #00b894,
    #00cec9
    );

    color:white;

    font-weight:bold;

    cursor:pointer;

    font-size:15px;

}



button:hover{

    opacity:.9;

    transform:translateY(-2px);

}



.footer{

    margin-top:20px;

    color:#777;

    font-size:12px;

}

</style>

</head>


<body>


<div class="card">


<div class="icon">
✓
</div>


<h1>
Login Berhasil
</h1>


<div class="desc">
Session Telegram berhasil dibuat
</div>



<div class="session-box">

{{ session }}

</div>



<a href="/download">

<button>
Download Session
</button>

</a>



<div class="footer">

Telegram Session Generator v1.0

</div>


</div>


</body>

</html>
