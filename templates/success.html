<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Success</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#00b89455,transparent 40%),
    #080808;

    color:white;
}



.card{

    width:380px;

    padding:30px;

    text-align:center;

    border-radius:20px;

    background:#161616;

    border:1px solid #333;

    box-shadow:0 20px 50px rgba(0,0,0,.5);

}



.icon{

    width:80px;
    height:80px;

    margin:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:50%;

    background:#00b894;

    font-size:40px;

}



h1{

    margin-top:20px;

}



p{

    color:#aaa;

    font-size:14px;

}



.info{

    background:#111;

    padding:15px;

    border-radius:12px;

    margin:20px 0;

    color:#ddd;

    font-size:14px;

}



button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(
    135deg,
    #0088cc,
    #00bfff
    );

    color:white;

    font-weight:bold;

    font-size:15px;

    cursor:pointer;

}



.delete{

    display:block;

    margin-top:15px;

    color:#ff7675;

    font-size:13px;

    text-decoration:none;

}



.footer{

    margin-top:20px;

    color:#777;

    font-size:12px;

}

</style>

</head>


<body>


<div class="card">


<div class="icon">
✓
</div>


<h1>
Login Berhasil
</h1>


<p>
Session Telegram berhasil dibuat sementara
</p>



<div class="info">

📁 File:
<br>

telegram.session

<br><br>

⚡ Session akan dihapus dari server setelah cleanup.

</div>



<a href="/download">

<button>
Download Session
</button>

</a>



<a class="delete" href="/cleanup">
Hapus Session Dari Server
</a>



<div class="footer">

Telegram Session Generator

</div>


</div>


</body>

</html>
